name: iOS Unsigned IPA

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update"
        required: true
        default: "v1.0.0"
      prerelease:
        description: "Mark release as prerelease"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ios-unsigned-release
  cancel-in-progress: false

jobs:
  build-unsigned-ipa:
    name: Build unsigned IPA
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select newest Xcode
        shell: bash
        run: |
          SELECTED_XCODE="$({
            for app in /Applications/Xcode*.app; do
              if [[ -d "$app" ]]; then
                version="$(plutil -extract CFBundleShortVersionString raw -o - "$app/Contents/Info.plist" 2>/dev/null || true)"
                if [[ -n "$version" ]]; then
                  printf '%s\t%s\n' "$version" "$app"
                fi
              fi
            done
          } | ruby -rrubygems -e 'rows = STDIN.each_line.map { |line| line.chomp.split("\t", 2) }; selected = rows.max_by { |version, _| Gem::Version.new(version) }; puts selected&.last.to_s')"
          if [[ -z "$SELECTED_XCODE" ]]; then
            echo "No Xcode installation was found." >&2
            exit 1
          fi
          sudo xcode-select -s "$SELECTED_XCODE/Contents/Developer"
          xcodebuild -version

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            release_tag="$GITHUB_REF_NAME"
          else
            release_tag="${{ inputs.tag }}"
          fi
          if [[ ! "$release_tag" =~ ^v[0-9]+([.][0-9]+){0,2}$ ]]; then
            echo "Release tag must be a numeric Apple version, for example v1.0.0." >&2
            exit 1
          fi
          version_name="${release_tag#v}"
          if release_target="$(git rev-parse --verify "${release_tag}^{commit}" 2>/dev/null)"; then
            tag_exists=true
          else
            release_target="$(git rev-parse HEAD)"
            tag_exists=false
          fi
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_target=$release_target" >> "$GITHUB_OUTPUT"
          echo "tag_exists=$tag_exists" >> "$GITHUB_OUTPUT"
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "artifact_name=ivLyrics-IOS-${release_tag}-release" >> "$GITHUB_OUTPUT"

      - name: Build unsigned IPA
        id: package
        env:
          VERSION_NAME: ${{ steps.release.outputs.version_name }}
          BUILD_NUMBER: ${{ github.run_number }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: scripts/build-unsigned-ipa.sh "$RUNNER_TEMP/release"

      - name: Generate release notes and AltStore source
        id: release_metadata
        env:
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
          IPA_PATH: ${{ steps.package.outputs.ipa_path }}
          CHECKSUM_PATH: ${{ steps.package.outputs.checksum_path }}
          VERSION_NAME: ${{ steps.package.outputs.version_name }}
          BUILD_NUMBER: ${{ steps.package.outputs.build_number }}
          RELEASE_METADATA_DIR: ${{ runner.temp }}/release-metadata
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
        run: python3 .github/scripts/generate_release_metadata.py

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release.outputs.artifact_name }}
          path: |
            ${{ steps.package.outputs.ipa_path }}
            ${{ steps.package.outputs.checksum_path }}
            ${{ steps.release_metadata.outputs.notes_path }}
            ${{ steps.release_metadata.outputs.version_path }}
            ${{ steps.release_metadata.outputs.altstore_source_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
          RELEASE_TARGET: ${{ steps.release.outputs.release_target }}
          TAG_EXISTS: ${{ steps.release.outputs.tag_exists }}
          PRERELEASE: ${{ inputs.prerelease || false }}
          IPA_PATH: ${{ steps.package.outputs.ipa_path }}
          CHECKSUM_PATH: ${{ steps.package.outputs.checksum_path }}
          NOTES_PATH: ${{ steps.release_metadata.outputs.notes_path }}
          VERSION_PATH: ${{ steps.release_metadata.outputs.version_path }}
          ALTSTORE_SOURCE_PATH: ${{ steps.release_metadata.outputs.altstore_source_path }}
        shell: bash
        run: |
          set -euo pipefail
          assets=(
            "$IPA_PATH"
            "$CHECKSUM_PATH"
            "$NOTES_PATH"
            "$VERSION_PATH"
            "$ALTSTORE_SOURCE_PATH"
          )
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            if [[ "$PRERELEASE" == "true" ]]; then
              gh release edit "$RELEASE_TAG" \
                --title "ivLyrics iOS $RELEASE_TAG" \
                --notes-file "$NOTES_PATH" \
                --prerelease
            else
              gh release edit "$RELEASE_TAG" \
                --title "ivLyrics iOS $RELEASE_TAG" \
                --notes-file "$NOTES_PATH"
            fi
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            if [[ "$TAG_EXISTS" != "true" ]]; then
              git tag "$RELEASE_TAG" "$RELEASE_TARGET"
              git push origin "refs/tags/$RELEASE_TAG"
            fi
            if [[ "$PRERELEASE" == "true" ]]; then
              gh release create "$RELEASE_TAG" "${assets[@]}" \
                --title "ivLyrics iOS $RELEASE_TAG" \
                --notes-file "$NOTES_PATH" \
                --prerelease
            else
              gh release create "$RELEASE_TAG" "${assets[@]}" \
                --title "ivLyrics iOS $RELEASE_TAG" \
                --notes-file "$NOTES_PATH"
            fi
          fi

      - name: Update AltStore source on main
        env:
          ALTSTORE_SOURCE_PATH: ${{ steps.release_metadata.outputs.altstore_source_path }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          worktree="$RUNNER_TEMP/altstore-main"
          cleanup() {
            git worktree remove --force "$worktree" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          git fetch origin main
          git worktree add --detach "$worktree" origin/main
          cp "$ALTSTORE_SOURCE_PATH" "$worktree/altstore-source.json"
          cd "$worktree"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add altstore-source.json
          if git diff --cached --quiet; then
            echo "AltStore source is already current."
            exit 0
          fi
          git commit \
            -m "Update AltStore source for $RELEASE_TAG" \
            -m "$RELEASE_TAG IPA의 실제 버전, 빌드, 크기와 SHA-256 정보를 반영했습니다."
          git push origin HEAD:main
