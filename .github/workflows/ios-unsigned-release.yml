name: iOS Unsigned IPA

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ios-unsigned-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-unsigned-ipa:
    name: Build unsigned IPA
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select newest Xcode
        shell: bash
        run: |
          SELECTED_XCODE="$({
            for app in /Applications/Xcode*.app; do
              if [[ -d "$app" ]]; then
                version="$(plutil -extract CFBundleShortVersionString raw -o - "$app/Contents/Info.plist" 2>/dev/null || true)"
                if [[ -n "$version" ]]; then
                  printf '%s\t%s\n' "$version" "$app"
                fi
              fi
            done
          } | ruby -rrubygems -e 'rows = STDIN.each_line.map { |line| line.chomp.split("\t", 2) }; selected = rows.max_by { |version, _| Gem::Version.new(version) }; puts selected&.last.to_s')"
          if [[ -z "$SELECTED_XCODE" ]]; then
            echo "No Xcode installation was found." >&2
            exit 1
          fi
          sudo xcode-select -s "$SELECTED_XCODE/Contents/Developer"
          xcodebuild -version

      - name: Resolve release metadata
        id: metadata
        shell: bash
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            release_tag="$GITHUB_REF_NAME"
            version_name="${release_tag#v}"
          else
            release_tag="manual-${GITHUB_RUN_NUMBER}"
            version_name="$(xcodebuild -project ivLyrics-IOS.xcodeproj -scheme ivLyrics-IOS -showBuildSettings | awk -F ' = ' '/ MARKETING_VERSION = / { print $2; exit }')"
          fi
          if [[ ! "$version_name" =~ ^[0-9]+([.][0-9]+){0,2}$ ]]; then
            echo "Tag must contain a numeric Apple version, for example v1.0.0." >&2
            exit 1
          fi
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "artifact_name=ivLyrics-IOS-${release_tag}-unsigned" >> "$GITHUB_OUTPUT"

      - name: Build unsigned IPA
        id: package
        env:
          VERSION_NAME: ${{ steps.metadata.outputs.version_name }}
          BUILD_NUMBER: ${{ github.run_number }}
          RELEASE_TAG: ${{ steps.metadata.outputs.release_tag }}
        run: scripts/build-unsigned-ipa.sh "$RUNNER_TEMP/release"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.artifact_name }}
          path: |
            ${{ steps.package.outputs.ipa_path }}
            ${{ steps.package.outputs.checksum_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release assets
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
          IPA_PATH: ${{ steps.package.outputs.ipa_path }}
          CHECKSUM_PATH: ${{ steps.package.outputs.checksum_path }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$IPA_PATH" "$CHECKSUM_PATH" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$IPA_PATH" "$CHECKSUM_PATH" \
              --title "ivLyrics iOS $GITHUB_REF_NAME" \
              --generate-notes
          fi
